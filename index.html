<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>B & M</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<!-- Bootstrap + Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    color:white;
    overflow-x:hidden;
}

/* ===== NAVBAR ===== */
nav{
    position:fixed;
    width:100%;
    top:0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    z-index:1000;
}

nav ul{
    display:flex;
    justify-content:center;
    padding:15px;
    list-style:none;
}

nav ul li{
    margin:0 15px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

nav ul li a:hover{
    color:#ff4da6;
}

/* ===== HERO ===== */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    background:url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
}

.hero h1{
    font-family:'Great Vibes';
    font-size:80px;
    animation: fadeDown 2s ease;
}

.hero p{
    margin-top:10px;
    letter-spacing:3px;
    animation: fadeUp 2s ease;
}

/* ===== BOTON ===== */
.btn{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    background:linear-gradient(45deg,#ff4da6,#ff9966);
    color:white;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #ff4da6;
}

/* ===== SECCIONES ===== */
section{
    padding:100px 20px;
    text-align:center;
}

.card{
    background:rgba(255,255,255,0.1);
    margin:20px;
    padding:20px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

/* ===== GALERIA ===== */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.gallery img{
    width:250px;
    height:200px;
    margin:10px;
    border-radius:15px;
    object-fit:cover;
    transition:.4s;
}

.gallery img:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #ff4da6;
}

/* ===== ANIMACIONES ===== */
@keyframes fadeDown{
    from{opacity:0; transform:translateY(-50px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(50px);}
    to{opacity:1; transform:translateY(0);}
}

/* SCROLL ANIMATION */
.hidden{
    opacity:0;
    transform:translateY(40px);
    transition:all 1s;
}

.show{
    opacity:1;
    transform:translateY(0);
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:30px;
    background:#000;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<ul>
<li><a href="#home">Inicio</a></li>
<li><a href="#about">Nosotros</a></li>
<li><a href="#gallery">Galería</a></li>
<li><a href="#contact">Contacto</a></li>
</ul>
</nav>

<!-- HERO -->
<div class="hero" id="home">
    <h1>Jack & Rose</h1>
    <p>Nos vamos a casar 💍</p>
    <button class="btn">Ver historia</button>
</div>

<!-- ABOUT -->
<section id="about">
<h2 class="hidden">Nuestra Historia</h2>

<div class="card hidden">
    <h3>Primer encuentro</h3>
    <p>Un momento mágico que cambió todo ✨</p>
</div>

<div class="card hidden">
    <h3>Propuesta</h3>
    <p>El inicio de una nueva vida juntos 💖</p>
</div>
</section>

<!-- GALERIA -->
<section id="gallery">
<h2 class="hidden">Galería</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">
<img src="https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0">
<img src="https://images.unsplash.com/photo-1504196606672-aef5c9cefc92">
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2 class="hidden">Contacto</h2>
<p class="hidden">📧 correo@ejemplo.com</p>
</section>

<footer>
<p>© 2026 mg</p>
</footer>

<!-- JS -->
<script>

// SCROLL ANIMATION
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));

// SMOOTH SCROLL
document.querySelectorAll("a").forEach(anchor=>{
    anchor.addEventListener("click", function(e){
        e.preventDefault();
        document.querySelector(this.getAttribute("href"))
        .scrollIntoView({behavior:"smooth"});
    });
});

</script>

</body>
</html>
